[pytest]
# Device integration tests — require STM32F469 Discovery board connected.
# Run with:  .venv/bin/pytest scenarios/MockUI/tests_device/ -v
# These tests are NOT included in the default test run.
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    device: tests requiring a connected STM32F469 Discovery board
