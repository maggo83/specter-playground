# Continue.dev Configuration — Specter-Playground
# Place this file at: .continue/config.yaml
# Or reference it from your global Continue config.

# HOW TO USE:
# 1. Copy or symlink this file to .continue/config.yaml
# 2. Set your API keys in environment or ~/.continue/config.yaml
# 3. In VS Code, switch profiles from the Continue sidebar to select an agent role
# 4. For most tasks: use the "Orchestrator" profile

models:
  # High-tier models — Orchestrator, Architect, Security
  - name: claude-opus-4
    provider: anthropic
    model: claude-opus-4
    apiKeyEnv: ANTHROPIC_API_KEY

  - name: gpt-4.1
    provider: openai
    model: gpt-4.1
    apiKeyEnv: OPENAI_API_KEY

  # Medium-tier models — Developer, UX Designer, PM
  - name: claude-sonnet-4-5
    provider: anthropic
    model: claude-sonnet-4-5
    apiKeyEnv: ANTHROPIC_API_KEY

  # Low-tier models — Tester, Doc Writer, i18n
  - name: claude-haiku-3-5
    provider: anthropic
    model: claude-haiku-3-5
    apiKeyEnv: ANTHROPIC_API_KEY

  # GitHub Copilot (via proxy)
  - name: copilot
    provider: openai
    model: gpt-4o
    apiBase: https://api.githubcopilot.com
    apiKeyEnv: GITHUB_TOKEN

# MCP Servers
mcpServers:
  - name: lvgl-sim
    command: python
    args:
      - mcp-servers/lvgl-sim/mcp_server.py
    env:
      PROJECT_ROOT: ${workspaceFolder}

  - name: code-rag
    command: python
    args:
      - .rag/mcp_server.py
    env:
      PROJECT_ROOT: ${workspaceFolder}

# Profiles — each profile represents one agent role
# Switch profiles in the Continue sidebar to change active persona

profiles:
  - name: Orchestrator
    description: "BMAD Orchestrator — coordinates the full agent team"
    defaultModel: claude-opus-4
    systemPrompt:
      file: ../.bmad/agents/orchestrator.md
    context:
      - file: ../.bmad/BMAD.md
      - file: ../.bmad/team-config.md
    tools:
      - lvgl-sim
      - code-rag

  - name: PM
    description: "Product Manager — task briefs and acceptance criteria"
    defaultModel: claude-sonnet-4-5
    systemPrompt:
      file: ../.bmad/agents/pm.md

  - name: Architect
    description: "Software Architect — design notes and technical decisions"
    defaultModel: claude-opus-4
    systemPrompt:
      file: ../.bmad/agents/architect.md
    tools:
      - code-rag

  - name: UX Designer
    description: "UX Designer — screen specs and LVGL layout"
    defaultModel: claude-sonnet-4-5
    systemPrompt:
      file: ../.bmad/agents/ux-designer.md
    tools:
      - lvgl-sim

  - name: Developer
    description: "Developer — implementation with MicroPython/LVGL"
    defaultModel: claude-sonnet-4-5
    systemPrompt:
      file: ../.bmad/agents/developer.md
    tools:
      - lvgl-sim
      - code-rag

  - name: Tester
    description: "QA Tester — pytest + MCP simulator tests"
    defaultModel: claude-haiku-3-5
    systemPrompt:
      file: ../.bmad/agents/tester.md
    tools:
      - lvgl-sim

  - name: Security
    description: "Security Agent — hardware wallet threat review"
    defaultModel: claude-opus-4
    systemPrompt:
      file: ../.bmad/agents/security.md
    tools:
      - code-rag

  - name: MicroPython Specialist
    description: "MicroPython + STM32F469 domain expert"
    defaultModel: claude-sonnet-4-5
    systemPrompt:
      file: ../.bmad/specialists/micropython-specialist.md

  - name: LVGL/MockUI Specialist
    description: "LVGL widget tree, simulator MCP, MockUI architecture"
    defaultModel: claude-sonnet-4-5
    systemPrompt:
      file: ../.bmad/specialists/lvgl-mockui-specialist.md
    tools:
      - lvgl-sim

  - name: i18n Specialist
    description: "Translation pipeline, lang_XX.bin, sync-i18n"
    defaultModel: claude-haiku-3-5
    systemPrompt:
      file: ../.bmad/specialists/i18n-specialist.md

  - name: HW/Bootloader Specialist
    description: "Bootloader, flash layout, secure boot, openocd"
    defaultModel: claude-sonnet-4-5
    systemPrompt:
      file: ../.bmad/specialists/hw-bootloader-specialist.md
